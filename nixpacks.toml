[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install]
cmds = [
  "npm install -g pnpm@9 --prefix /usr/local",
  "export PATH=$PATH:/usr/local/bin && pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "export PATH=$PATH:/usr/local/bin && pnpm --filter api exec prisma generate",
  "export PATH=$PATH:/usr/local/bin && pnpm --filter api build"
]

[start]
cmd = "export PATH=$PATH:/usr/local/bin:/app/node_modules/.bin && npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && npx prisma db seed --schema=apps/api/prisma/schema.prisma && node apps/api/dist/index.js"